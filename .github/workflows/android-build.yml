name: Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APKs
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleNormalDebug :app:assembleJava64Debug :app:assembleHisenseDebug --stacktrace

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tvbox-apks
          path: |
            app/build/outputs/apk/normal/debug/TVBox_debug-java32.apk
            app/build/outputs/apk/java64/debug/TVBox_debug-java64.apk
            app/build/outputs/apk/hisense/debug/TVBox_debug-hisense.apk
